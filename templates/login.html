<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f7fb;
    color: #182033;
  }
  main {
    width: min(420px, calc(100vw - 32px));
    background: #fff;
    border: 1px solid #dfe5f0;
    border-radius: 8px;
    padding: 28px;
    box-shadow: 0 16px 40px rgba(24, 32, 51, 0.10);
  }
  h1 { margin: 0 0 8px; font-size: 22px; }
  p { margin: 0 0 22px; color: #60708a; line-height: 1.45; }
  label { display: block; margin-bottom: 8px; font-weight: 600; }
  input {
    width: 100%;
    height: 42px;
    border: 1px solid #cfd8e6;
    border-radius: 6px;
    padding: 0 12px;
    font: inherit;
  }
  button {
    width: 100%;
    height: 42px;
    margin-top: 16px;
    border: 0;
    border-radius: 6px;
    background: #246bfe;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }
  .error { min-height: 20px; margin-top: 12px; color: #b42318; font-size: 14px; }
</style>
</head>
<body>
<main>
  <h1>Connexion</h1>
  <p>Cette instance remote protège les CV, lettres et documents archivés.</p>
  <form id="login-form">
    <label for="password">Mot de passe</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
    <button type="submit">Se connecter</button>
    <div id="error" class="error"></div>
  </form>
</main>
<script>
document.getElementById('login-form').addEventListener('submit', async function (event) {
  event.preventDefault();
  const error = document.getElementById('error');
  error.textContent = '';
  const resp = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: document.getElementById('password').value })
  });
  if (resp.ok) {
    const next = new URLSearchParams(window.location.search).get('next') || '/';
    window.location.assign(next);
    return;
  }
  const body = await resp.json().catch(function () { return {}; });
  error.textContent = body.error || 'Connexion impossible.';
});
</script>
</body>
</html>
